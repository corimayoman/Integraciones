<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMS Integration Tracker</title>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Design Tokens & Base Styles -->
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/dark.css">
  <link rel="stylesheet" href="css/print.css" media="print">

  <!-- Component & Layout Styles -->
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/views.css">
</head>
<body>
  <!-- Skip navigation link for accessibility -->
  <a href="#main-content" class="skip-link">Saltar al contenido principal</a>

  <header role="banner" id="app-header">
    <div class="header-content">
      <h1 class="app-title">AMS Integration Tracker</h1>
      <div class="header-actions" aria-label="Acciones del header">
        <!-- Connect Jira button / connection status injected by JS -->
      </div>
    </div>
    <!-- Offline banner injected by JS when in offline mode -->
  </header>

  <nav role="navigation" aria-label="Navegación principal" id="app-nav">
    <!-- Navigation links injected by JS -->
  </nav>

  <main role="main" id="main-content" aria-live="polite">
    <!-- Views rendered here by JS -->
  </main>

  <aside role="complementary" id="alerts-panel" aria-label="Panel de alertas">
    <!-- Alerts panel injected by JS -->
  </aside>

  <footer role="contentinfo" id="app-footer">
    <p>&copy; 2025 Globant — AMS Integration Tracker</p>
  </footer>

  <!-- Application Scripts (ES Modules) -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
